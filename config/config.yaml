# Cosmo router in standalone (no control plane) mode: executes the statically
# composed config produced by `wgc router compose` (baked into the image by the
# Dockerfile). Schema updates therefore ship as a new image via deploy.yml.
listen_addr: 0.0.0.0:3002
log_level: info
dev_mode: false
playground_enabled: true
introspection_enabled: true

execution_config:
  file:
    path: /config/execution-config.json

# Client -> router boundary: every operation needs a Google-signed ID token.
# Same enforcement model as linear-example's auth gate, with zero custom code.
# The router -> subgraph boundary is Cloud Run IAM (modules.subgraphToken).
authentication:
  jwt:
    jwks:
      # Firebase ID tokens — the linear-example login mechanism (Google sign-in).
      - url: https://www.googleapis.com/service_accounts/v1/jwk/securetoken@system.gserviceaccount.com
        algorithms: [RS256]
        audiences:
          - project-d60a83c1-2c60-4d51-ad0
      # Google OIDC ID tokens — service accounts (CI smoke tests) and gcloud users.
      - url: https://www.googleapis.com/oauth2/v3/certs
        algorithms: [RS256]
        audiences:
          - https://cosmo-router-dkuqnmldta-uc.a.run.app
          - 32555940559.apps.googleusercontent.com # gcloud CLI's fixed OAuth client id

authorization:
  require_authentication: true

# Standalone router: nothing to export telemetry to (yet).
telemetry:
  tracing:
    enabled: false
  metrics:
    otlp:
      enabled: false
    prometheus:
      enabled: false
graphql_metrics:
  enabled: false

modules:
  requestLog:
    header_value: cosmo-custom
  subgraphToken:
    enabled: true
