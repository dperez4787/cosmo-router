# Deploys the custom Cosmo router to Cloud Run.
#
# Two things trigger a rollout:
#   - push to main (router code / config changes)
#   - repository_dispatch "subgraphs-updated" or manual workflow_dispatch
#     (schema changes in imdb-federation: recompose against the live SDLs
#     and ship a new image — the execution config is baked into the image)
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [subgraphs-updated]

concurrency: deploy-main

env:
  PROJECT_ID: project-d60a83c1-2c60-4d51-ad0
  REGION: us-central1
  AR_REPO: cosmo-router
  SERVICE: cosmo-router
  RUNTIME_SA: cosmorouter-run@project-d60a83c1-2c60-4d51-ad0.iam.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      # After gcloud auth: introspecting the IAM-locked subgraphs needs
      # per-audience ID tokens minted as the deploy SA.
      - name: Compose supergraph from deployed subgraphs
        run: ./scripts/compose.sh
        env:
          IMPERSONATE_SA: ${{ secrets.DEPLOY_SA }}

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/router:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/router:${{ github.sha }}" \
            --region "${{ env.REGION }}" \
            --project "${{ env.PROJECT_ID }}" \
            --service-account "${{ env.RUNTIME_SA }}" \
            --allow-unauthenticated \
            --port 3002 \
            --min-instances 1 \
            --max-instances 2 \
            --memory 512Mi \
            --cpu 1 \
            --cpu-boost \
            --quiet

      - name: Smoke test (federated query across 3 subgraphs)
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region "${{ env.REGION }}" --project "${{ env.PROJECT_ID }}" \
            --format 'value(status.url)')
          echo "Router URL: $URL"

          # Unauthenticated operations must be rejected at the router boundary.
          CODE=$(curl -s -o /dev/null -w '%{http_code}' --retry 3 --retry-all-errors --max-time 120 \
            -X POST "$URL/graphql" -H 'Content-Type: application/json' \
            -d '{"query":"{ __typename }"}')
          [ "$CODE" = "401" ] || { echo "expected 401 without token, got $CODE"; exit 1; }

          TOKEN=$(gcloud auth print-identity-token \
            --impersonate-service-account "${{ secrets.DEPLOY_SA }}" --audiences "$URL")
          RESP=$(curl -sf --retry 3 --retry-all-errors --max-time 120 -D /tmp/headers \
            -X POST "$URL/graphql" \
            -H 'Content-Type: application/json' \
            -H "Authorization: Bearer $TOKEN" \
            -d '{"query":"{ title(tconst: \"tt0944947\") { primaryTitle rating { averageRating } directors { primaryName } } }"}')
          echo "$RESP"
          echo "$RESP" | jq -e '.data.title.primaryTitle and .data.title.rating.averageRating and (.data.title.directors | length > 0) and (.errors == null)'
          grep -i 'x-imdb-router' /tmp/headers || { echo "custom module header missing"; exit 1; }
          echo "Federated smoke test OK (401 unauthenticated, 200 with ID token)"

      - name: Smoke test (field-level governance)
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region "${{ env.REGION }}" --project "${{ env.PROJECT_ID }}" \
            --format 'value(status.url)')
          POLICY_URL=https://imdb-policy-service-dkuqnmldta-uc.a.run.app

          # The deploy SA has no persona: transparent redact mode must return
          # partial data — governed field ABSENT, no errors array (clients
          # like graphql-request throw on errors), redaction reported in
          # extensions.governance.
          TOKEN=$(gcloud auth print-identity-token \
            --impersonate-service-account "${{ secrets.DEPLOY_SA }}" --audiences "$URL")
          Q='{"query":"{ title(tconst: \"tt0944947\") { primaryTitle rating { averageRating numVotes } } }"}'
          REDACTED=$(curl -sf -D /tmp/gov-headers -X POST "$URL/graphql" \
            -H 'Content-Type: application/json' -H "Authorization: Bearer $TOKEN" -d "$Q")
          echo "$REDACTED"
          echo "$REDACTED" | jq -e '
            .errors == null
            and .data.title.primaryTitle
            and .data.title.rating.averageRating
            and (.data.title.rating | has("numVotes") | not)
            and (.extensions.governance.redactedFields | index("Rating.numVotes"))'
          grep -i 'x-imdb-policy-revision' /tmp/gov-headers || { echo "policy revision header missing"; exit 1; }
          grep -i 'access-control-expose-headers' /tmp/gov-headers || { echo "expose header missing"; exit 1; }

          # ...while an analyst persona token minted by the policy service
          # sees the value, with the resolved roles surfaced in a header.
          PERSONA=$(curl -sf -X POST "$POLICY_URL/v1/token" \
            -H 'Content-Type: application/json' -d '{"persona":"analyst"}' | jq -r .token)
          ALLOWED=$(curl -sf -D /tmp/an-headers -X POST "$URL/graphql" \
            -H 'Content-Type: application/json' -H "Authorization: Bearer $PERSONA" -d "$Q")
          echo "$ALLOWED"
          echo "$ALLOWED" | jq -e '.data.title.rating.numVotes and (.errors == null) and (.extensions.governance == null)'
          grep -i 'x-imdb-roles.*analyst' /tmp/an-headers || { echo "roles header missing"; exit 1; }
          echo "Governance smoke test OK (redacted without role, full data as analyst)"
